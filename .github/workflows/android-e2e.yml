name: Android E2E & Unit Tests

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "android-e2e"
  cancel-in-progress: false

jobs:
  android-e2e-appium:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Grant execute permission for gradlew
        working-directory: ./android
        run: chmod +x gradlew

      - name: Build Android Debug APK
        working-directory: ./android
        shell: bash
        run: bash ./gradlew assembleDebug

      - name: Prepare Test Script
        run: chmod +x OralDiagnosisAIAppium/scripts/ci_run_tests.sh

      - name: Run Android Emulator & Appium Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: ./OralDiagnosisAIAppium/scripts/ci_run_tests.sh

      - name: Process Reports
        if: always()
        run: |
          # Copy reports for GH Pages
          mkdir -p docs/reports/latest docs/reports/history/build-${{ github.run_number }}
          cp OralDiagnosisAIAppium/execution-report.html docs/reports/latest/ 2>/dev/null || true
          cp OralDiagnosisAIAppium/execution-report.html docs/reports/history/build-${{ github.run_number }}/ 2>/dev/null || true
          
          # Publish Summary
          cat <<EOF >> $GITHUB_STEP_SUMMARY
          ## Android Appium E2E Execution Summary
          - **Total Tests**: 1111
          - **Build Number**: ${{ github.run_number }}
          - **Commit**: ${{ github.sha }}
          - **Emulator**: Nexus 6, API 29 (x86_64)
          - **Android Version**: 10.0
          - **APK Version**: Debug Build
          - **Report Links**:
            - [Latest Execution Report](./reports/latest/execution-report.html)
            - [Build History Report](./reports/history/build-${{ github.run_number }}/execution-report.html)
          - **Live GitHub Pages URL**: ${{ steps.deployment.outputs.page_url }}
          EOF

      - name: Upload Android Test Results Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-results
          path: |
            OralDiagnosisAIAppium/execution-report.html
            OralDiagnosisAIAppium/appium-report.xlsx

      - name: Upload GitHub Pages Artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4
