name: Android E2E & Unit Tests

on:
  workflow_call:
  workflow_dispatch:

jobs:
  android-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: ./android
        run: chmod +x gradlew

      - name: Clean Project
        working-directory: ./android
        shell: bash
        run: bash ./gradlew clean

      - name: Run Android Lint
        continue-on-error: true
        working-directory: ./android
        shell: bash
        run: bash ./gradlew lintDebug --stacktrace

      - name: Run Android Unit Tests
        working-directory: ./android
        shell: bash
        run: bash ./gradlew testDebugUnitTest

      - name: Run Android Emulator & Espresso UI Tests
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 28
          target: default
          arch: x86
          profile: Nexus 6
          script: cd android && chmod +x gradlew && bash ./gradlew connectedDebugAndroidTest

      - name: Build Android Debug APK
        working-directory: ./android
        shell: bash
        run: bash ./gradlew assembleDebug

      - name: Prepare Test Reports
        if: always()
        run: |
          mkdir -p reports/android-unit reports/android-ui reports/android-lint
          find android/app/build/test-results -type f -name "*.xml" -exec cp {} reports/android-unit/ \; || true
          find android/app/build/outputs/androidTest-results -type f -name "*.xml" -exec cp {} reports/android-ui/ \; || true
          find android/app/build/reports -type f -name "lint-results-*.xml" -exec cp {} reports/android-lint/ \; || true

      - name: Upload Android Unit & UI Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: reports/

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
