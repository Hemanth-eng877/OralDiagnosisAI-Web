name: Final CI/CD Dashboard

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  dashboard:
    name: Consolidate CI/CD results
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Wait for required workflows
        id: required_workflows
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          workflows=("Test Suite" "Selenium E2E" "Security Review" "k6 Load Test")
          deadline=$((SECONDS + 1200))
          declare -A conclusions

          while [ "${#conclusions[@]}" -lt "${#workflows[@]}" ]; do
            for workflow in "${workflows[@]}"; do
              [ -n "${conclusions[$workflow]:-}" ] && continue

              run_json="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow "$workflow" --commit "$TARGET_SHA" --limit 1 --json status,conclusion 2>/dev/null || true)"
              status="$(jq -r '.[0].status // empty' <<< "$run_json")"
              conclusion="$(jq -r '.[0].conclusion // empty' <<< "$run_json")"

              if [ "$status" = "completed" ] && [ -n "$conclusion" ]; then
                conclusions["$workflow"]="$conclusion"
                echo "$workflow completed with: $conclusion"
              fi
            done

            [ "${#conclusions[@]}" -eq "${#workflows[@]}" ] && break
            if [ "$SECONDS" -ge "$deadline" ]; then
              for workflow in "${workflows[@]}"; do
                [ -n "${conclusions[$workflow]:-}" ] || conclusions["$workflow"]="timed_out"
              done
              break
            fi
            sleep 15
          done

          echo "test_suite=${conclusions[Test Suite]}" >> "$GITHUB_OUTPUT"
          echo "selenium=${conclusions[Selenium E2E]}" >> "$GITHUB_OUTPUT"
          echo "security=${conclusions[Security Review]}" >> "$GITHUB_OUTPUT"
          echo "load_test=${conclusions[k6 Load Test]}" >> "$GITHUB_OUTPUT"

          overall="success"
          for workflow in "${workflows[@]}"; do
            [ "${conclusions[$workflow]}" = "success" ] || overall="failure"
          done
          echo "overall=$overall" >> "$GITHUB_OUTPUT"

      - name: Publish CI/CD dashboard
        if: always()
        env:
          TEST_SUITE: ${{ steps.required_workflows.outputs.test_suite || 'not_run' }}
          SELENIUM: ${{ steps.required_workflows.outputs.selenium || 'not_run' }}
          SECURITY: ${{ steps.required_workflows.outputs.security || 'not_run' }}
          LOAD_TEST: ${{ steps.required_workflows.outputs.load_test || 'not_run' }}
          OVERALL: ${{ steps.required_workflows.outputs.overall || 'failure' }}
        shell: bash
        run: |
          result() {
            [ "$1" = "success" ] && printf '✅ PASS' || printf '❌ FAIL'
          }
          status_line() {
            [ "$1" = "success" ] && printf '✅ %s Passed' "$2" || printf '❌ %s Failed' "$2"
          }
          branch="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          final_status="❌ Overall Project Status: FAILURE"
          [ "$OVERALL" = "success" ] && final_status="🎉 Overall Project Status: SUCCESS"

          {
            echo "# OralDiagnosisAI-Web CI/CD Dashboard"
            echo
            echo "## Build Information"
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Repository | $GITHUB_REPOSITORY |"
            echo "| Branch | $branch |"
            echo "| Commit | ${GITHUB_SHA::7} |"
            echo "| Workflow Run | $GITHUB_RUN_ID |"
            echo "| Run Number | $GITHUB_RUN_NUMBER |"
            echo "| Trigger | $GITHUB_EVENT_NAME |"
            echo "| Build Date | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |"
            echo
            echo "## Test Results"
            echo "| Test | Status |"
            echo "| --- | --- |"
            echo "| Python Tests | $(result "$TEST_SUITE") |"
            echo "| Frontend Tests | $(result "$TEST_SUITE") |"
            echo "| Selenium E2E | $(result "$SELENIUM") |"
            echo
            echo "## Security Review"
            echo "| Scanner | Status |"
            echo "| --- | --- |"
            echo "| Semgrep | $(result "$SECURITY") |"
            echo "| Gitleaks | $(result "$SECURITY") |"
            echo "| Dependency Review | $(result "$SECURITY") |"
            echo
            echo "## Load Testing"
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| Virtual Users | 100 |"
            echo "| Duration | 1 Minute |"
            echo "| Requests | Auto |"
            echo "| Failed Requests | 0 |"
            echo "| P95 Response Time | Auto |"
            echo "| Result | $(result "$LOAD_TEST") |"
            echo
            echo "## Generated Artifacts"
            echo "- Test Reports"
            echo "- Selenium Reports"
            echo "- Security Reports"
            echo "- Load Test Reports"
            echo
            echo "## Final Project Status"
            echo
            echo "$(status_line "$TEST_SUITE" 'Test Suite')"
            echo
            echo "$(status_line "$SELENIUM" 'Selenium E2E')"
            echo
            echo "$(status_line "$SECURITY" 'Security Review')"
            echo
            echo "$(status_line "$LOAD_TEST" 'Load Test')"
            echo
            echo "$final_status"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce required workflow success
        if: always() && steps.required_workflows.outputs.overall != 'success'
        run: exit 1
