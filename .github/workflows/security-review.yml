name: Automated Security Review

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  security-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      REPORT_DIR: Vulnerability Test Results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare report directory
        run: mkdir -p "$REPORT_DIR"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit (Frontend)
        id: npm_audit
        continue-on-error: true
        working-directory: ./web
        run: |
          npm audit --json > "../$REPORT_DIR/npm-audit.json" || true

      - name: Run Semgrep
        id: semgrep
        continue-on-error: true
        run: |
          python -m pip install --disable-pip-version-check semgrep
          semgrep scan --config auto --json --output "$REPORT_DIR/semgrep.json" || true

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --source . --report-format json --report-path "${{ env.REPORT_DIR }}/gitleaks.json" --no-banner --exit-code 0

      - name: Run Trivy filesystem scan
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: ${{ env.REPORT_DIR }}/trivy.json
          exit-code: "0"

      - name: Run Dependency Review
        id: dependency_review
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          comment-summary-in-pr: always

      - name: Generate Custom Security Reports
        id: generate_reports
        if: always()
        working-directory: ./scripts
        env:
          REPORT_DIR: ../Vulnerability Test Results
        run: |
          npm install
          node generateSecurityReports.js

      - name: Publish Summary to GITHUB_STEP_SUMMARY
        if: always()
        run: |
          cat "$REPORT_DIR/executive-summary.md" >> $GITHUB_STEP_SUMMARY

      - name: Upload Security Reports Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-test-results
          path: ${{ env.REPORT_DIR }}/

      - name: Security Gate (Zero Critical Policy)
        if: always()
        run: |
          CRITICAL_COUNT=$(cat "$REPORT_DIR/gate_status.txt")
          echo "Critical findings detected: $CRITICAL_COUNT"
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "Security Gate Failed: One or more critical vulnerabilities were found."
            exit 1
          else
            echo "Security Gate Passed: No critical vulnerabilities found."
            exit 0
          fi
