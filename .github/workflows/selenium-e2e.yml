name: Selenium E2E

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  selenium-e2e:
    name: Selenium end-to-end tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/selenium
      RUN_SELENIUM_E2E: "true"
      BASE_URL: http://127.0.0.1:5000
      HEADLESS: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            selenium/requirements.txt

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install ChromeDriver
        id: chromedriver
        uses: nanasess/setup-chromedriver@v2

      - name: Install Selenium dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r selenium/requirements.txt

      - name: Prepare report directories
        run: mkdir -p reports screenshots logs selenium/reports selenium/screenshots

      - name: Start application
        run: |
          python app.py > logs/application.log 2>&1 &
          echo $! > logs/application.pid
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:5000/login && exit 0
            sleep 2
          done
          echo "Application did not become ready"
          exit 1

      # The complete suite produces the reports but is non-gating by design.
      - name: Run all Selenium tests and generate reports
        id: full_suite
        continue-on-error: true
        env:
          CHROMEDRIVER: ${{ steps.chromedriver.outputs.chromedriver-path }}
        run: |
          START_TIME=$(date +%s)
          python -m pytest selenium/tests \
            --junitxml=reports/selenium-results.xml \
            --html=reports/selenium-report.html \
            --self-contained-html
          echo "execution_seconds=$(( $(date +%s) - START_TIME ))" >> "$GITHUB_OUTPUT"

      - name: Generate Excel report
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          from xml.etree import ElementTree as ET
          from openpyxl import Workbook
          from openpyxl.styles import Font

          report = Path("reports/selenium-results.xml")
          book = Workbook()
          sheet = book.active
          sheet.title = "Selenium Results"
          sheet.append(["Test", "Outcome", "Duration (s)", "Details"])
          for cell in sheet[1]:
              cell.font = Font(bold=True)
          if report.exists():
              root = ET.parse(report).getroot()
              for case in root.iter("testcase"):
                  failure = case.find("failure")
                  if failure is None:
                      failure = case.find("error")
                  skipped = case.find("skipped")
                  outcome = "failed" if failure is not None else "skipped" if skipped is not None else "passed"
                  sheet.append([case.get("name"), outcome, case.get("time", "0"), failure.get("message", "") if failure is not None else ""])
          book.save("reports/Selenium_Test_Report.xlsx")
          PY

      - name: Publish Selenium summary
        if: always()
        env:
          EXECUTION_SECONDS: ${{ steps.full_suite.outputs.execution_seconds || '0' }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          from xml.etree import ElementTree as ET

          total = passed = failed = skipped = 0
          report = Path("reports/selenium-results.xml")
          if report.exists():
              root = ET.parse(report).getroot()
              for case in root.iter("testcase"):
                  total += 1
                  if case.find("failure") is not None or case.find("error") is not None:
                      failed += 1
                  elif case.find("skipped") is not None:
                      skipped += 1
                  else:
                      passed += 1
          seconds = int(os.environ.get("EXECUTION_SECONDS", "0"))
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("## Selenium E2E Summary\\n\\n")
              summary.write("| Total Tests | Passed | Failed | Skipped | Execution Time |\\n")
              summary.write("| ---: | ---: | ---: | ---: | ---: |\\n")
              summary.write(f"| {total} | {passed} | {failed} | {skipped} | {seconds}s |\\n")
          PY

      - name: Upload Selenium reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-e2e-artifacts
          if-no-files-found: warn
          path: |
            reports/Selenium_Test_Report.xlsx
            reports/selenium-report.html
            reports/selenium-results.xml
            selenium/screenshots/
            selenium/reports/
            screenshots/
            logs/

      # Only the critical-path smoke tests determine the workflow result.
      - name: Gate on critical smoke tests
        env:
          CHROMEDRIVER: ${{ steps.chromedriver.outputs.chromedriver-path }}
        run: |
          python -m pytest selenium/tests -m smoke --junitxml=reports/critical-smoke-results.xml
