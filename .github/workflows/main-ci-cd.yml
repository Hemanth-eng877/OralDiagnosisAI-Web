name: Main CI/CD

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  test:
    name: Test Suite
    uses: ./.github/workflows/test.yml
    secrets: inherit

  api_test:
    name: Backend API Tests
    uses: ./.github/workflows/api-test.yml
    secrets: inherit

  security_review:
    name: Security Review
    uses: ./.github/workflows/security-review.yml
    secrets: inherit
    permissions:
      contents: read
      pull-requests: read
      security-events: write

  selenium_e2e:
    name: Selenium E2E
    needs: [test, api_test]
    uses: ./.github/workflows/selenium-e2e.yml
    secrets: inherit

  k6_load_test:
    name: k6 Load Test
    needs: [test, api_test]
    uses: ./.github/workflows/load-test.yml
    secrets: inherit

  android_e2e:
    name: Android E2E & Tests
    uses: ./.github/workflows/android-e2e.yml
    secrets: inherit

  enterprise_dashboard:
    name: Enterprise Dashboard
    needs: [test, api_test, security_review, selenium_e2e, k6_load_test, android_e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate Enterprise Dashboard
        run: |
          python .github/scripts/generate_dashboard.py >> $GITHUB_STEP_SUMMARY