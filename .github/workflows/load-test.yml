name: API Load Testing (k6)

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  performance-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Start Flask Backend
        run: |
          python app.py &
          echo "Waiting for Flask server to start..."
          # Retry up to 10 times to check if port 5000 is open
          for i in {1..10}; do
            curl -sSf http://127.0.0.1:5000 > /dev/null && echo "Server is up!" && break || sleep 3
          done
        env:
          FLASK_APP: app.py
          FLASK_ENV: testing

      - name: Run k6 Performance Test
        env:
          BACKEND_URL: "http://127.0.0.1:5000"
        run: |
          k6 run --summary-export=summary.json scripts/load-test.js

      - name: Parse Summary & Generate GitHub Report
        if: always()
        env:
          GITHUB_STEP_SUMMARY: $GITHUB_STEP_SUMMARY
        run: |
          node scripts/parseK6Summary.js

      - name: Upload Performance Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-reports
          path: |
            summary.json
            performance-summary.md
