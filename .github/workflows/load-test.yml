name: k6 Load Test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  load-test:
    name: 100 VU Application Load Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      BASE_URL: http://127.0.0.1:5000
      REPORT_DIR: reports
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install application dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Prepare report directory
        run: |
          mkdir -p reports logs

      - name: Start Flask Application
        run: |
          python app.py > logs/application.log 2>&1 &
          echo $! > logs/application.pid

          echo "Waiting for application..."

          for i in {1..30}; do
            if curl --silent --fail "$BASE_URL/login" > /dev/null; then
              echo "Application Started Successfully."
              exit 0
            fi
            sleep 2
          done

          echo "Application failed to start."
          cat logs/application.log
          exit 1

      - name: Run k6 Load Test
        id: k6
        continue-on-error: true
        run: |
          set +e

          k6 run \
            --summary-export=reports/load-test-results.json \
            --out csv=reports/load-test-results.csv \
            k6/load-test.js

          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-load-test-reports
          path: |
            reports/
            logs/

      - name: Stop Flask Application
        if: always()
        run: |
          if [ -f logs/application.pid ]; then
            kill $(cat logs/application.pid) || true
          fi

      - name: Fail workflow if k6 thresholds failed
        if: always() && steps.k6.outputs.exit_code != '0'
        run: |
          echo "❌ k6 Load Test Thresholds Failed"
          exit 1
