{% extends "base.html" %}
{% block title %}{{ mode }} Patient | OralDiagnosisAI{% endblock %}
{% block header_title %}Patient Profile{% endblock %}
{% block content %}
<section class="content-panel">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <p class="eyebrow">Patient details</p>
            <h3 class="h4 mb-0">{{ mode }} Patient</h3>
        </div>
        <a href="{{ url_for('patients') }}" class="btn btn-outline-primary"><i class="fa-solid fa-arrow-left"></i> Back</a>
    </div>
    <form method="post" class="row g-3">
        <div class="col-md-6">
            <label for="full_name" class="form-label">Full name</label>
            <input type="text" class="form-control" id="full_name" name="full_name" value="{{ patient.full_name or '' }}" required>
        </div>
        <div class="col-md-3">
            <label for="age" class="form-label">Age</label>
            <input type="number" class="form-control" id="age" name="age" min="0" max="120" value="{{ patient.age or '' }}">
        </div>
        <div class="col-md-3">
            <label for="gender" class="form-label">Gender</label>
            <select class="form-select" id="gender" name="gender">
                {% set gender = patient.gender or '' %}
                <option value="">Select</option>
                <option value="Female" {{ 'selected' if gender == 'Female' else '' }}>Female</option>
                <option value="Male" {{ 'selected' if gender == 'Male' else '' }}>Male</option>
                <option value="Other" {{ 'selected' if gender == 'Other' else '' }}>Other</option>
            </select>
        </div>
        <div class="col-md-6">
            <label for="phone" class="form-label">Phone</label>
            <input type="text" class="form-control" id="phone" name="phone" value="{{ patient.phone or '' }}">
        </div>
        <div class="col-md-6">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" value="{{ patient.email or '' }}">
        </div>
        <div class="col-12">
            <label for="notes" class="form-label">Clinical notes</label>
            <textarea class="form-control" id="notes" name="notes" rows="4">{{ patient.notes or '' }}</textarea>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> {{ mode }} Patient</button>
        </div>
    </form>
</section>
{% endblock %}
