{% extends "auth_base.html" %}
{% block title %}Signup | OralDiagnosisAI{% endblock %}
{% block content %}
<div class="auth-brand auth-brand--compact">
    <img class="auth-brand-logo" src="{{ url_for('static', filename='img/oraldiagnosisai-logo.png') }}" alt="OralDiagnosisAI logo">
    <div>
        <h1>Create your account</h1>
        <p>Join the professional OralDiagnosisAI care team.</p>
    </div>
</div>
<form method="post" class="auth-form">
    <div class="mb-3">
        <label for="name" class="form-label">Full name</label>
        <input type="text" class="form-control" id="name" name="name" required autocomplete="name">
    </div>
    <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input type="email" class="form-control" id="email" name="email" required autocomplete="email">
    </div>
    <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" required autocomplete="new-password" minlength="8">
    </div>
    <button type="submit" class="btn btn-primary w-100">Create account</button>
    <p class="mt-3 mb-0 text-center text-muted">Already registered? <a href="{{ url_for('login') }}">Login</a></p>
</form>
{% endblock %}
