{% extends "auth_base.html" %}
{% block title %}Login | OralDiagnosisAI{% endblock %}
{% block content %}
<div class="auth-brand auth-brand--compact">
    <img class="auth-brand-logo" src="{{ url_for('static', filename='img/oraldiagnosisai-logo.png') }}" alt="OralDiagnosisAI logo">
    <div>
        <h1>Welcome back</h1>
        <p>Secure clinical access for your oral care workspace.</p>
    </div>
</div>
<form method="post" class="auth-form">
    <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input type="email" class="form-control" id="email" name="email" required autocomplete="email">
    </div>
    <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary w-100">Login</button>
    <p class="mt-3 mb-0 text-center text-muted">Need an account? <a href="{{ url_for('signup') }}">Create one</a></p>
</form>
{% endblock %}
